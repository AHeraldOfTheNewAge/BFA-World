<!DOCTYPE html>
<html>

	<head>
		<meta charset="utf-8">
		<style>
			* {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}

			body {
				background: #f0ece3;
				font-family: Georgia, serif;
				overflow: hidden;
				width: 100vw;
				height: 100vh;
			}

			#app {
				width: 100vw;
				height: 100vh;
				display: flex;
				flex-direction: column;
			}

			#toolbar {
				display: flex;
				align-items: center;
				gap: 8px;
				padding: 7px 14px;
				background: #e8e3d8;
				border-bottom: 1px solid #c8c0a8;
				flex-shrink: 0;
				flex-wrap: wrap;
			}

			.tool-btn {
				display: flex;
				align-items: center;
				gap: 5px;
				padding: 5px 11px;
				border: 1.5px solid #8a7a60;
				background: transparent;
				border-radius: 3px;
				cursor: pointer;
				font-family: Georgia, serif;
				font-size: 12px;
				color: #3a2e1e;
				transition: background 0.15s;
			}

			.tool-btn.active {
				background: #3a2e1e;
				color: #f0ece3;
			}

			.tool-btn:hover {
				background: #d0c8b4;
				color: #3a2e1e;
			}

			.tool-btn.active:hover {
				background: #3a2e1e;
				color: #f0ece3;
			}

			.divider {
				width: 1px;
				height: 22px;
				background: #c8c0a8;
				flex-shrink: 0;
			}

			.mute-btn {
				padding: 3px 8px;
				border: 1.5px solid #8a7a60;
				background: transparent;
				border-radius: 3px;
				cursor: pointer;
				font-family: Georgia, serif;
				font-size: 10px;
				color: #3a2e1e;
				transition: all 0.15s;
				white-space: nowrap;
			}

			.mute-btn.muted {
				background: #8a7a60;
				color: #f0ece3;
				text-decoration: line-through;
			}

			.mute-btn:hover {
				background: #d0c8b4;
			}

			.mute-btn.muted:hover {
				background: #6a5a48;
			}

			.mute-group {
				display: flex;
				flex-direction: column;
				align-items: center;
				gap: 3px;
			}

			.mute-label {
				font-size: 9px;
				color: #8a7a60;
				letter-spacing: 0.03em;
			}

			#play-btn {
				padding: 5px 16px;
				border: 1.5px solid #3a2e1e;
				background: #3a2e1e;
				color: #f0ece3;
				border-radius: 3px;
				cursor: pointer;
				font-family: Georgia, serif;
				font-size: 12px;
				margin-left: auto;
			}

			#play-btn:hover {
				background: #5a4a30;
			}

			#bpm-wrap {
				display: flex;
				align-items: center;
				gap: 6px;
				font-size: 12px;
				color: #3a2e1e;
			}

			#bpm {
				width: 72px;
				accent-color: #3a2e1e;
			}

			#canvas-wrap {
				flex: 1;
				position: relative;
				overflow: hidden;
			}

			canvas {
				display: block;
			}

			#hint {
				position: absolute;
				bottom: 10px;
				left: 50%;
				transform: translateX(-50%);
				font-size: 11px;
				color: #8a7a60;
				pointer-events: none;
				letter-spacing: 0.05em;
			}
		</style>
	</head>

	<body>
		<div id="app">
			<div id="toolbar">
				<button class="tool-btn active" id="btn-tree" onclick="setTool('tree')">&#9651; Pine</button>
				<button class="tool-btn" id="btn-oak" onclick="setTool('oak')">&#11044; Oak</button>
				<button class="tool-btn" id="btn-willow" onclick="setTool('willow')">&#10046; Willow</button>
				<button class="tool-btn" id="btn-grain" onclick="setTool('grain')">&#9641; Grain</button>
				<button class="tool-btn" id="btn-flower" onclick="setTool('flower')">&#10022; Flower</button>
				<button class="tool-btn" id="btn-rock" onclick="setTool('rock')">&#9632; Rock</button>
				<button class="tool-btn" id="btn-pebble" onclick="setTool('pebble')">&#8231; Pebbles</button>
				<button class="tool-btn" id="btn-erase" onclick="setTool('erase')">&#10005; Erase</button>
				<div class="divider"></div>
				<div class="mute-group"><span class="mute-label">pine</span><button class="mute-btn" id="mute-tree" onclick="toggleMute('tree')">M</button></div>
				<div class="mute-group"><span class="mute-label">oak</span><button class="mute-btn" id="mute-oak" onclick="toggleMute('oak')">M</button></div>
				<div class="mute-group"><span class="mute-label">willow</span><button class="mute-btn" id="mute-willow" onclick="toggleMute('willow')">M</button></div>
				<div class="mute-group"><span class="mute-label">grain</span><button class="mute-btn" id="mute-grain" onclick="toggleMute('grain')">M</button></div>
				<div class="mute-group"><span class="mute-label">flower</span><button class="mute-btn" id="mute-flower" onclick="toggleMute('flower')">M</button></div>
				<div class="mute-group"><span class="mute-label">rock</span><button class="mute-btn" id="mute-rock" onclick="toggleMute('rock')">M</button></div>
				<div class="mute-group"><span class="mute-label">pebbles</span><button class="mute-btn" id="mute-pebble" onclick="toggleMute('pebble')">M</button></div>
				<div class="divider"></div>
				<div id="bpm-wrap">
					<label for="bpm">BPM</label>
					<input type="range" id="bpm" min="40" max="180" value="90" oninput="updateBPM(this.value)">
					<span id="bpm-val">90</span>
				</div>
				<button id="play-btn" onclick="togglePlay()">&#9654; Play</button>
			</div>
			<div id="canvas-wrap">
				<canvas id="c"></canvas>
				<div id="hint">click land to place · water = blocked</div>
			</div>
		</div>

		<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.7.77/Tone.js"></script>
		<script>
			var canvas = document.getElementById('c');
			var ctx = canvas.getContext('2d');
			var wrap = document.getElementById('canvas-wrap');

			var COLS = 48, ROWS = 32;
			var W, H, TW, TH;
			var mapTiles = [];
			var objects = [];
			var tool = 'tree';
			var playing = false;
			var bpm = 90;
			var scanX = 0;
			var lastBeat = -1;
			var toneStarted = false;
			var bird = { x: -60, y: 100, vy: 0, flapT: 0 };

			var muted = { tree: false, oak: false, willow: false, grain: false, flower: false, rock: false, pebble: false };

			var treeSynth = null, oakSynth = null, willowSynth = null, grainSynth = null, flowerSynth = null, rockSynth = null, pebbleSynth = null;

			var TNOTES = ['C5', 'E5', 'G5', 'A5', 'B5', 'D5'];
			var TNOTES_HILL = ['C4', 'Eb4', 'F4', 'Ab4', 'Bb4', 'D4'];
			var ONOTES = ['C2', 'D2', 'E2', 'G2', 'A2', 'B2'];
			var ONOTES_HILL = ['C3', 'Eb3', 'F3', 'G3', 'Bb3', 'D3'];
			var WNOTES = ['D3', 'F3', 'Ab3', 'Bb3', 'C4', 'Eb4'];
			var WNOTES_WATER = ['D2', 'F2', 'Ab2', 'Bb2', 'C3', 'Eb3'];
			var GNOTES = ['A1', 'B1', 'C2', 'D2', 'E2', 'F2'];
			var GNOTES_WATER = ['A0', 'B0', 'C1', 'D1', 'E1', 'F1'];
			var FNOTES = ['C7', 'D7', 'E7', 'F#7', 'G7', 'A7'];
			var FNOTES_WATER = ['C6', 'D6', 'Eb6', 'F6', 'G6', 'Bb6'];

			function seededRand(seed) {
				var s = seed;
				return function() {
					s = (s * 1664525 + 1013904223) & 0xffffffff;
					return (s >>> 0) / 4294967296;
				};
			}

			function initAudio() {
				treeSynth = new Tone.Synth({
					oscillator: { type: 'triangle' },
					envelope: { attack: 0.01, decay: 0.3, sustain: 0, release: 0.3 },
					volume: -8
				}).toDestination();

				oakSynth = new Tone.Synth({
					oscillator: { type: 'sine' },
					envelope: { attack: 0.02, decay: 0.6, sustain: 0.1, release: 0.5 },
					volume: -4
				}).toDestination();

				var wReverb = new Tone.Reverb({ decay: 4, wet: 0.7 }).toDestination();
				var wVib = new Tone.Vibrato({ frequency: 3, depth: 0.4 }).connect(wReverb);
				willowSynth = new Tone.Synth({
					oscillator: { type: 'sine' },
					envelope: { attack: 0.3, decay: 0.8, sustain: 0.4, release: 1.5 },
					volume: -6
				}).connect(wVib);

				var gReverb = new Tone.Reverb({ decay: 8, wet: 0.85 }).toDestination();
				var gChorus = new Tone.Chorus({ frequency: 0.4, delayTime: 18, depth: 0.7, wet: 0.6 }).connect(gReverb);
				var gFilter = new Tone.Filter({ frequency: 280, type: 'lowpass', rolloff: -24 }).connect(gChorus);
				grainSynth = new Tone.Synth({
					oscillator: { type: 'sawtooth' },
					envelope: { attack: 0.8, decay: 1.2, sustain: 0.8, release: 3.0 },
					volume: -2
				}).connect(gFilter);

				var fReverb = new Tone.Reverb({ decay: 1.2, wet: 0.5 }).toDestination();
				var fDist = new Tone.Distortion({ distortion: 0.7, wet: 0.4 }).connect(fReverb);
				var fEnv = new Tone.AmplitudeEnvelope({ attack: 0.001, decay: 0.08, sustain: 0, release: 0.1 }).connect(fDist);
				var fOsc = new Tone.Oscillator({ type: 'square', volume: -6 }).connect(fEnv);
				flowerSynth = {
					trigger: function(note, time) {
						fOsc.frequency.setValueAtTime(Tone.Frequency(note).toFrequency(), time);
						fOsc.start(time);
						fEnv.triggerAttackRelease('16n', time);
						fOsc.stop(time + 0.5);
					}
				};

				rockSynth = new Tone.MembraneSynth({
					pitchDecay: 0.05, octaves: 6,
					envelope: { attack: 0.001, decay: 0.2, sustain: 0, release: 0.1 },
					volume: -4
				}).toDestination();

				pebbleSynth = new Tone.MetalSynth({
					frequency: 800,
					envelope: { attack: 0.001, decay: 0.1, release: 0.05 },
					harmonicity: 5.1,
					modulationIndex: 32,
					resonance: 4000,
					octaves: 1.5,
					volume: 0
				}).toDestination();
			}

			function toggleMute(type) {
				muted[type] = !muted[type];
				var btn = document.getElementById('mute-' + type);
				if (muted[type]) btn.classList.add('muted');
				else btn.classList.remove('muted');
			}

			function safeSet(r, c, val) {
				if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return;
				if (!mapTiles[r]) mapTiles[r] = [];
				mapTiles[r][c] = val;
			}

			function generateMap() {
				var rand = seededRand(Date.now() & 0xfffff);
				var r, c, i, cx, cy, rx, ry, dx, dy;
				mapTiles = [];
				for (r = 0; r < ROWS; r++) {
					mapTiles[r] = [];
					for (c = 0; c < COLS; c++) mapTiles[r][c] = 0;
				}
				var nWater = 9 + Math.floor(rand() * 5);
				for (i = 0; i < nWater; i++) {
					cx = 3 + Math.floor(rand() * (COLS - 6));
					cy = 2 + Math.floor(rand() * (ROWS - 4));
					rx = 2 + Math.floor(rand() * 6);
					ry = 1 + Math.floor(rand() * 4);
					for (r = cy - ry - 2; r <= cy + ry + 2; r++) {
						for (c = cx - rx - 2; c <= cx + rx + 2; c++) {
							dx = (c - cx) / rx; dy = (r - cy) / ry;
							if (dx * dx + dy * dy < 1 + rand() * 0.6) safeSet(r, c, 1);
						}
					}
				}
				var nRivers = 2 + Math.floor(rand() * 3);
				for (i = 0; i < nRivers; i++) {
					var rc = Math.floor(rand() * COLS);
					var rr = Math.floor(rand() * ROWS);
					var len = 8 + Math.floor(rand() * 14);
					for (var s = 0; s < len; s++) {
						safeSet(rr, rc, 1); safeSet(rr, rc + 1, 1);
						var dir = rand();
						if (dir < 0.5) rc += 1;
						else if (dir < 0.75) rr += 1;
						else rr -= 1;
					}
				}
				var nHills = 7 + Math.floor(rand() * 5);
				for (i = 0; i < nHills; i++) {
					cx = 2 + Math.floor(rand() * (COLS - 4));
					cy = 1 + Math.floor(rand() * (ROWS - 2));
					rx = 2 + Math.floor(rand() * 5);
					ry = 1 + Math.floor(rand() * 4);
					for (r = cy - ry; r <= cy + ry; r++) {
						for (c = cx - rx; c <= cx + rx; c++) {
							if (r < 0 || r >= ROWS || c < 0 || c >= COLS) continue;
							if (mapTiles[r][c] === 1) continue;
							dx = (c - cx) / rx; dy = (r - cy) / ry;
							if (dx * dx + dy * dy < 1 + rand() * 0.3) safeSet(r, c, 2);
						}
					}
				}
			}

			function resize() {
				W = wrap.clientWidth; H = wrap.clientHeight;
				canvas.width = W; canvas.height = H;
				TW = W / COLS; TH = H / ROWS;
				bird.y = H * 0.25;
				draw();
			}

			function drawMap() {
				var r, c, row, col, t, tx, ty, l, lx, ly, hl, hlx;
				ctx.fillStyle = '#e8e3d5';
				ctx.fillRect(0, 0, W, H);
				var rand2 = seededRand(42);
				ctx.fillStyle = '#c8c0aa';
				for (var i = 0; i < 1800; i++) {
					var sx = rand2() * W, sy = rand2() * H;
					var sc = Math.floor(sx / TW), sr = Math.floor(sy / TH);
					if (sc >= 0 && sc < COLS && sr >= 0 && sr < ROWS && mapTiles[sr][sc] === 0) ctx.fillRect(sx, sy, 1, 1);
				}
				for (row = 0; row < ROWS; row++) {
					for (col = 0; col < COLS; col++) {
						t = mapTiles[row][col]; tx = col * TW; ty = row * TH;
						if (t === 1) {
							ctx.fillStyle = '#b8ccd4'; ctx.fillRect(tx, ty, TW, TH);
							var sr2 = seededRand((row * 100 + col) * 7);
							ctx.strokeStyle = '#9ab4be'; ctx.lineWidth = 0.5;
							for (l = 0; l < 2; l++) {
								lx = tx + TW * 0.1 + sr2() * TW * 0.6; ly = ty + TH * 0.3 + l * TH * 0.3;
								ctx.beginPath(); ctx.moveTo(lx, ly); ctx.quadraticCurveTo(lx + TW * 0.15, ly - TH * 0.1, lx + TW * 0.3, ly); ctx.stroke();
							}
						} else if (t === 2) {
							ctx.fillStyle = '#d0c8a8'; ctx.fillRect(tx, ty, TW, TH);
							var sh = seededRand((row * 100 + col) * 13);
							ctx.strokeStyle = '#a89878'; ctx.lineWidth = 0.4;
							for (hl = 0; hl < 3; hl++) {
								hlx = tx + sh() * TW;
								ctx.beginPath(); ctx.moveTo(hlx, ty); ctx.lineTo(hlx + TW * 0.3, ty + TH); ctx.stroke();
							}
						}
					}
				}
				ctx.strokeStyle = 'rgba(100,90,70,0.07)'; ctx.lineWidth = 0.5;
				for (c = 0; c <= COLS; c++) { ctx.beginPath(); ctx.moveTo(c * TW, 0); ctx.lineTo(c * TW, H); ctx.stroke(); }
				for (r = 0; r <= ROWS; r++) { ctx.beginPath(); ctx.moveTo(0, r * TH); ctx.lineTo(W, r * TH); ctx.stroke(); }
			}

			function drawPine(x, y, w, h, lit) {
				var cx = x + w / 2, ty = y + h * 0.08, i, lx, ly, lw, lh;
				ctx.fillStyle = lit ? '#8a5a28' : '#6a4020';
				ctx.fillRect(cx - w * 0.08, ty + h * 0.55, w * 0.16, h * 0.38);
				var colors = lit ? ['#3a6e2a', '#4a8a38', '#5aaa48'] : ['#2a4e1a', '#3a6e28', '#4a8838'];
				for (i = 0; i < 3; i++) {
					lx = cx - w * (0.38 - i * 0.06); ly = ty + h * (0.08 + i * 0.18);
					lw = w * (0.76 - i * 0.12); lh = h * (0.38 - i * 0.06);
					ctx.fillStyle = colors[i];
					ctx.beginPath(); ctx.moveTo(cx, ty + h * 0.04 * i); ctx.lineTo(lx + lw, ly + lh); ctx.lineTo(lx, ly + lh); ctx.closePath(); ctx.fill();
				}
				if (lit) {
					ctx.strokeStyle = '#aad870'; ctx.lineWidth = 1;
					ctx.beginPath(); ctx.moveTo(cx, ty); ctx.lineTo(x + w * 0.1, ty + h * 0.6); ctx.lineTo(x + w * 0.9, ty + h * 0.6); ctx.closePath(); ctx.stroke();
				}
			}

			function drawOak(x, y, w, h, lit) {
				var cx = x + w / 2, ty = y + h * 0.1;
				ctx.fillStyle = lit ? '#7a4a18' : '#5a3010';
				ctx.fillRect(cx - w * 0.12, ty + h * 0.42, w * 0.24, h * 0.52);
				ctx.fillStyle = lit ? '#1a5e18' : '#133a10';
				ctx.beginPath(); ctx.ellipse(cx + w * 0.06, ty + h * 0.3, w * 0.36, h * 0.3, 0, 0, Math.PI * 2); ctx.fill();
				ctx.fillStyle = lit ? '#2a7a28' : '#1e5018';
				ctx.beginPath(); ctx.ellipse(cx, ty + h * 0.22, w * 0.4, h * 0.32, 0, 0, Math.PI * 2); ctx.fill();
				ctx.fillStyle = lit ? '#38a030' : '#286820';
				ctx.beginPath(); ctx.ellipse(cx - w * 0.1, ty + h * 0.14, w * 0.26, h * 0.2, -0.3, 0, Math.PI * 2); ctx.fill();
				if (lit) { ctx.strokeStyle = '#90ee60'; ctx.lineWidth = 1.2; ctx.beginPath(); ctx.ellipse(cx, ty + h * 0.22, w * 0.4, h * 0.32, 0, 0, Math.PI * 2); ctx.stroke(); }
			}

			function drawWillow(x, y, w, h, lit) {
				var cx = x + w / 2, i, n, tx2, ty0, sway, dropLen, nt, nx, ny;
				ctx.fillStyle = lit ? '#6a4a2a' : '#4a3018';
				ctx.fillRect(cx - w * 0.07, y + h * 0.42, w * 0.14, h * 0.52);
				ctx.fillStyle = lit ? '#4a7a38' : '#2a4e22';
				ctx.beginPath(); ctx.ellipse(cx, y + h * 0.28, w * 0.38, h * 0.26, 0, 0, Math.PI * 2); ctx.fill();
				for (i = 0; i < 7; i++) {
					tx2 = cx - w * 0.32 + (i / 6) * w * 0.64;
					ty0 = y + h * 0.22 + Math.abs(Math.sin(i * 1.3)) * h * 0.1;
					sway = Math.sin(i * 0.9) * w * 0.12;
					dropLen = h * 0.38 + Math.sin(i * 1.7) * h * 0.1;
					ctx.strokeStyle = lit ? '#3a6a28' : '#1e3e14'; ctx.lineWidth = 0.8;
					ctx.beginPath(); ctx.moveTo(tx2, ty0);
					ctx.bezierCurveTo(tx2 + sway * 0.3, ty0 + dropLen * 0.4, tx2 + sway, ty0 + dropLen * 0.75, tx2 + sway * 0.6, ty0 + dropLen);
					ctx.stroke();
					ctx.fillStyle = lit ? '#3a6a28' : '#1e3e14';
					for (n = 0; n < 3; n++) {
						nt = (n + 1) / 4; nx = tx2 + sway * nt * 0.8; ny = ty0 + dropLen * nt;
						ctx.beginPath(); ctx.ellipse(nx, ny, w * 0.03, h * 0.015, -0.4, 0, Math.PI * 2); ctx.fill();
					}
				}
				if (lit) { ctx.strokeStyle = '#aaeeaa'; ctx.lineWidth = 1; ctx.beginPath(); ctx.ellipse(cx, y + h * 0.28, w * 0.38, h * 0.26, 0, 0, Math.PI * 2); ctx.stroke(); }
			}

			function drawGrain(x, y, w, h, lit) {
				var stemColor = lit ? '#c8a832' : '#8a7020';
				var headColor = lit ? '#e8c840' : '#a08828';
				var i, k, frac, sx, baseY, sway, stemTop, ky;
				for (i = 0; i < 6; i++) {
					frac = (i + 0.5) / 6; sx = x + frac * w; baseY = y + h * 0.95;
					sway = Math.sin(i * 1.4) * w * 0.06; stemTop = y + h * 0.32;
					ctx.strokeStyle = stemColor; ctx.lineWidth = 0.9;
					ctx.beginPath(); ctx.moveTo(sx, baseY); ctx.quadraticCurveTo(sx + sway * 0.5, baseY - h * 0.35, sx + sway, stemTop); ctx.stroke();
					ctx.beginPath(); ctx.moveTo(sx + sway * 0.4, baseY - h * 0.28); ctx.quadraticCurveTo(sx + sway * 0.4 + w * 0.07, baseY - h * 0.38, sx + sway * 0.4 + w * 0.12, baseY - h * 0.32); ctx.stroke();
					ctx.fillStyle = headColor;
					ctx.beginPath(); ctx.ellipse(sx + sway, stemTop + h * 0.04, w * 0.045, h * 0.13, sway * 0.04, 0, Math.PI * 2); ctx.fill();
					ctx.strokeStyle = lit ? '#f0d050' : '#786018'; ctx.lineWidth = 0.5;
					for (k = 0; k < 4; k++) {
						ky = stemTop + h * 0.01 + k * h * 0.025;
						ctx.beginPath(); ctx.moveTo(sx + sway - w * 0.035, ky); ctx.lineTo(sx + sway + w * 0.035, ky); ctx.stroke();
					}
				}
				if (lit) { ctx.strokeStyle = 'rgba(255,220,60,0.45)'; ctx.lineWidth = 1; ctx.strokeRect(x + 1, y + 1, w - 2, h - 2); }
			}

			function drawFlower(x, y, w, h, lit) {
				var cx = x + w / 2;
				var fc = cx + Math.sin(cx * 0.3) * w * 0.05;
				var stemTop = y + h * 0.45;
				ctx.strokeStyle = lit ? '#6a9a30' : '#4a6e1a'; ctx.lineWidth = 0.9;
				ctx.beginPath(); ctx.moveTo(fc, y + h * 0.95); ctx.quadraticCurveTo(fc - w * 0.08, y + h * 0.67, fc, stemTop); ctx.stroke();
				ctx.fillStyle = lit ? '#5a8a28' : '#3a5e18';
				ctx.beginPath(); ctx.moveTo(fc, stemTop + h * 0.18); ctx.quadraticCurveTo(fc + w * 0.18, stemTop + h * 0.1, fc + w * 0.22, stemTop + h * 0.22); ctx.quadraticCurveTo(fc + w * 0.1, stemTop + h * 0.28, fc, stemTop + h * 0.18); ctx.fill();
				var p, angle, px, py;
				for (p = 0; p < 6; p++) {
					angle = (p / 6) * Math.PI * 2;
					px = fc + Math.cos(angle) * h * 0.1; py = stemTop + Math.sin(angle) * h * 0.1;
					ctx.fillStyle = lit ? '#e870a0' : '#b04878';
					ctx.beginPath(); ctx.ellipse(px, py, w * 0.09, h * 0.055, angle, 0, Math.PI * 2); ctx.fill();
				}
				ctx.fillStyle = lit ? '#ffe050' : '#c8a020';
				ctx.beginPath(); ctx.arc(fc, stemTop, w * 0.1, 0, Math.PI * 2); ctx.fill();
				if (lit) { ctx.strokeStyle = '#ffaadd'; ctx.lineWidth = 1; ctx.beginPath(); ctx.arc(fc, stemTop, w * 0.28, 0, Math.PI * 2); ctx.stroke(); }
			}

			function drawPebbles(x, y, w, h, lit) {
				var cx = x + w / 2, cy = y + h * 0.65;
				var positions = [
					{ ox: -0.22, oy: 0.04, rx: 0.12, ry: 0.08, rot: 0.2 },
					{ ox: 0.10, oy: -0.05, rx: 0.10, ry: 0.07, rot: -0.3 },
					{ ox: 0.20, oy: 0.08, rx: 0.08, ry: 0.06, rot: 0.5 },
					{ ox: -0.05, oy: 0.10, rx: 0.09, ry: 0.06, rot: -0.1 },
					{ ox: -0.18, oy: -0.06, rx: 0.07, ry: 0.05, rot: 0.4 }
				];
				var i, p;
				for (i = 0; i < positions.length; i++) {
					p = positions[i];
					ctx.fillStyle = lit ? '#d0c0a0' : '#909080';
					ctx.beginPath();
					ctx.ellipse(cx + p.ox * w, cy + p.oy * h, p.rx * w, p.ry * h, p.rot, 0, Math.PI * 2);
					ctx.fill();
					ctx.fillStyle = lit ? '#e8d8b8' : '#b0a898';
					ctx.beginPath();
					ctx.ellipse(cx + p.ox * w - p.rx * w * 0.3, cy + p.oy * h - p.ry * h * 0.3, p.rx * w * 0.35, p.ry * h * 0.3, p.rot, 0, Math.PI * 2);
					ctx.fill();
				}
				if (lit) {
					ctx.strokeStyle = 'rgba(255,240,180,0.6)'; ctx.lineWidth = 1;
					ctx.beginPath(); ctx.ellipse(cx, cy, w * 0.35, h * 0.22, 0, 0, Math.PI * 2); ctx.stroke();
				}
			}

			function drawRock(x, y, w, h, lit) {
				var cx = x + w / 2, cy = y + h * 0.6;
				ctx.fillStyle = lit ? '#c0b090' : '#908070';
				ctx.beginPath(); ctx.ellipse(cx, cy, w * 0.42, h * 0.32, 0, 0, Math.PI * 2); ctx.fill();
				ctx.fillStyle = lit ? '#e0d0b0' : '#b0a080';
				ctx.beginPath(); ctx.ellipse(cx - w * 0.08, cy - h * 0.08, w * 0.18, h * 0.12, -0.3, 0, Math.PI * 2); ctx.fill();
				if (lit) { ctx.strokeStyle = '#fff0c0'; ctx.lineWidth = 1.2; ctx.beginPath(); ctx.ellipse(cx, cy, w * 0.42, h * 0.32, 0, 0, Math.PI * 2); ctx.stroke(); }
			}

			function drawObjects(highlightCol) {
				var i, obj, x, y, lit;
				for (i = 0; i < objects.length; i++) {
					obj = objects[i]; x = obj.col * TW; y = obj.row * TH;
					lit = playing && obj.col === highlightCol && !muted[obj.type];
					if (obj.type === 'tree') drawPine(x, y, TW, TH, lit);
					else if (obj.type === 'oak') drawOak(x, y, TW, TH, lit);
					else if (obj.type === 'willow') drawWillow(x, y, TW, TH, lit);
					else if (obj.type === 'grain') drawGrain(x, y, TW, TH, lit);
					else if (obj.type === 'flower') drawFlower(x, y, TW, TH, lit);
					else if (obj.type === 'rock') drawRock(x, y, TW, TH, lit);
					else if (obj.type === 'pebble') drawPebbles(x, y, TW, TH, lit);
				}
			}

			function drawBird(x, y, flapAngle) {
				ctx.save(); ctx.translate(x, y);
				ctx.strokeStyle = '#1a1208'; ctx.lineWidth = 1.2; ctx.lineCap = 'round';
				ctx.fillStyle = '#1a1208'; ctx.beginPath(); ctx.arc(0, 0, 2, 0, Math.PI * 2); ctx.fill();
				var wa = flapAngle;
				ctx.beginPath(); ctx.moveTo(-2, 0); ctx.quadraticCurveTo(-8, -6 + wa * 4, -14, -2 + wa * 6); ctx.stroke();
				ctx.beginPath(); ctx.moveTo(2, 0); ctx.quadraticCurveTo(8, -6 + wa * 4, 14, -2 + wa * 6); ctx.stroke();
				ctx.beginPath(); ctx.moveTo(-2, 0); ctx.lineTo(-7, 2); ctx.stroke();
				ctx.restore();
			}

			function draw() {
				ctx.clearRect(0, 0, W, H);
				drawMap();
				var hCol = playing ? Math.floor(scanX / TW) : -1;
				drawObjects(hCol);
				if (playing) drawBird(bird.x, bird.y, Math.sin(bird.flapT) * 0.8);
			}

			var lastTime = 0;
			function loop(ts) {
				var dt = Math.min((ts - lastTime) / 1000, 0.05);
				lastTime = ts;
				if (playing) {
					var period = (60 / bpm) * COLS;
					var t = ((Tone.Transport.seconds % period) + period) % period;
					scanX = (t / period) * W;
					bird.x = scanX; bird.flapT += dt * 6;
					bird.vy += (Math.sin(bird.flapT * 0.4) * 18 - bird.vy) * dt * 2;
					bird.y += bird.vy * dt;
					if (bird.y < H * 0.08) bird.y = H * 0.08;
					if (bird.y > H * 0.85) bird.y = H * 0.85;
					var col = Math.floor(scanX / TW);
					if (col !== lastBeat) { lastBeat = col; triggerBeat(col); }
				}
				draw();
				requestAnimationFrame(loop);
			}

			function isNearWater(col, row) {
				var r, c;
				for (r = row - 2; r <= row + 2; r++) {
					for (c = col - 2; c <= col + 2; c++) {
						if (r < 0 || r >= ROWS || c < 0 || c >= COLS) continue;
						if (mapTiles[r][c] === 1) return true;
					}
				}
				return false;
			}

			function isOnHill(col, row) {
				return mapTiles[row] && mapTiles[row][col] === 2;
			}

			function triggerBeat(col) {
				if (!toneStarted) return;
				var i, obj, now, tOff, oOff, wOff, gOff, fOff, rOff, note, onHill, nearWater;
				now = Tone.now(); tOff = 0; oOff = 0; wOff = 0; gOff = 0; fOff = 0; rOff = 0;
				var pOff = 0;
				for (i = 0; i < objects.length; i++) {
					obj = objects[i];
					if (obj.col !== col) continue;
					if (muted[obj.type]) continue;
					onHill = isOnHill(obj.col, obj.row);
					nearWater = isNearWater(obj.col, obj.row);
					if (obj.type === 'tree') {
						note = onHill ? TNOTES_HILL[obj.row % TNOTES_HILL.length] : TNOTES[obj.row % TNOTES.length];
						treeSynth.triggerAttackRelease(note, onHill ? '8n' : '16n', now + tOff);
						tOff += 0.005;
					} else if (obj.type === 'oak') {
						note = onHill ? ONOTES_HILL[obj.row % ONOTES_HILL.length] : ONOTES[obj.row % ONOTES.length];
						oakSynth.triggerAttackRelease(note, onHill ? '4n' : '8n', now + oOff);
						oOff += 0.005;
					} else if (obj.type === 'willow') {
						note = nearWater ? WNOTES_WATER[obj.row % WNOTES_WATER.length] : WNOTES[obj.row % WNOTES.length];
						willowSynth.triggerAttackRelease(note, nearWater ? '2n' : '4n', now + wOff);
						wOff += 0.005;
					} else if (obj.type === 'grain') {
						note = nearWater ? GNOTES_WATER[obj.row % GNOTES_WATER.length] : GNOTES[obj.row % GNOTES.length];
						grainSynth.triggerAttackRelease(note, '2n', now + gOff);
						gOff += 0.005;
					} else if (obj.type === 'flower') {
						note = nearWater ? FNOTES_WATER[obj.row % FNOTES_WATER.length] : FNOTES[obj.row % FNOTES.length];
						flowerSynth.trigger(note, now + fOff);
						fOff += 0.005;
					} else if (obj.type === 'rock') {
						rockSynth.triggerAttackRelease('C1', '8n', now + rOff);
						rOff += 0.005;
					}
				}
			}

			function playPreview(t, row) {
				if (!toneStarted) return;
				var now = Tone.now();
				if (t === 'tree') treeSynth.triggerAttackRelease(TNOTES[row % TNOTES.length], '16n', now);
				else if (t === 'oak') oakSynth.triggerAttackRelease(ONOTES[row % ONOTES.length], '8n', now);
				else if (t === 'willow') willowSynth.triggerAttackRelease(WNOTES[row % WNOTES.length], '4n', now);
				else if (t === 'grain') grainSynth.triggerAttackRelease(GNOTES[row % GNOTES.length], '2n', now);
				else if (t === 'flower') flowerSynth.trigger(FNOTES[row % FNOTES.length], now);
				else if (t === 'rock') rockSynth.triggerAttackRelease('C1', '8n', now);
				else if (t === 'pebble') pebbleSynth.triggerAttackRelease('32n', now);
			}

			function setTool(t) {
				tool = t;
				var btns = document.querySelectorAll('.tool-btn'), i;
				for (i = 0; i < btns.length; i++) btns[i].classList.remove('active');
				document.getElementById('btn-' + t).classList.add('active');
			}

			function updateBPM(v) {
				bpm = +v;
				document.getElementById('bpm-val').textContent = v;
				Tone.Transport.bpm.value = bpm;
			}

			function togglePlay() {
				Tone.start().then(function() {
					if (!toneStarted) { initAudio(); toneStarted = true; }
					playing = !playing;
					var btn = document.getElementById('play-btn');
					if (playing) {
						Tone.Transport.start(); btn.innerHTML = '&#9632; Stop';
						lastBeat = -1; bird.y = H * 0.25; bird.vy = 0;
					} else {
						Tone.Transport.stop(); btn.innerHTML = '&#9654; Play';
						scanX = 0; lastBeat = -1;
					}
				});
			}

			canvas.addEventListener('click', function(e) {
				var rect = canvas.getBoundingClientRect();
				var col = Math.floor((e.clientX - rect.left) / TW);
				var row = Math.floor((e.clientY - rect.top) / TH);
				if (col < 0 || col >= COLS || row < 0 || row >= ROWS) return;
				if (tool === 'erase') {
					var kept = [], i;
					for (i = 0; i < objects.length; i++) { if (objects[i].col !== col || objects[i].row !== row) kept.push(objects[i]); }
					objects = kept; draw(); return;
				}
				if (mapTiles[row][col] === 1) return;
				var kept2 = [], j;
				for (j = 0; j < objects.length; j++) { if (objects[j].col !== col || objects[j].row !== row) kept2.push(objects[j]); }
				objects = kept2;
				objects.push({ col: col, row: row, type: tool });
				Tone.start().then(function() {
					if (!toneStarted) { initAudio(); toneStarted = true; }
					playPreview(tool, row);
					draw();
				});
			});

			$(function() { generateMap(); resize(); requestAnimationFrame(loop); });
			$(window).on('resize', resize);
		</script>
	</body>

</html>
